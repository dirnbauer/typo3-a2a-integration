name: webconsulting/a2a-concierge
typeName: a2a_concierge
title: 'A2A Concierge'
description: 'A visitor-facing window onto the site''s A2A agent: the visitor picks a skill (summarise, draft, plan) or types a request, and watches the task move through its lifecycle — including a cooperative pause where the agent asks for one more detail — before it hands back a finished artifact. Demonstrates the A2A protocol (Agent Card + JSON-RPC task lifecycle) on a real page.'
group: forms
prefixFields: true
prefixType: vendor
basics:
  - TYPO3/Appearance
fields:
  -
    identifier: header
    useExistingField: true
    label: 'Headline'
  -
    identifier: intro
    type: Textarea
    rows: 3
    label: 'Intro text'
    description: 'Shown above the concierge. Invite the visitor to delegate a task.'
    default: 'Ask our site agent to summarise a page, draft an email or plan onboarding. Watch the task move through its lifecycle and hand you back a result.'
  -
    identifier: placeholder
    type: Text
    label: 'Input placeholder'
    default: 'e.g. "Draft an outreach email about our new plans"'
  -
    identifier: accent
    type: Select
    renderType: selectSingle
    label: 'Accent colour'
    default: '#0d9488'
    items:
      -
        label: 'A2A teal (default)'
        value: '#0d9488'
      -
        label: 'Match site (theme primary)'
        value: 'var(--primary)'
      -
        label: 'Ocean blue'
        value: '#2563eb'
      -
        label: 'Indigo'
        value: '#4f46e5'
      -
        label: 'Amber'
        value: '#d97706'
  -
    identifier: show_events
    type: Checkbox
    renderType: checkboxToggle
    label: 'Show the lifecycle frames'
    description: 'Reveals an "under the hood" panel listing the A2A JSON-RPC frames as they arrive. Turn off for a clean production look.'
    default: 1
