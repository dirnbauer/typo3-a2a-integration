<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:cb="http://typo3.org/ns/TYPO3/CMS/ContentBlocks/ViewHelpers"
      data-namespace-typo3-fluid="true">

<div style="padding:.5rem 0; border-left:3px solid #0d9488; padding-left:.75rem;">
    <div>
        <strong>A2A Concierge</strong>
        <span style="margin-left:.4rem; font-size:.72em; font-weight:700; color:#0d9488; border:1px solid #0d9488; border-radius:50rem; padding:.05rem .45rem;">Agent2Agent</span>
        <div style="color:#777; font-size:.85em; margin-top:.15rem;">The site's A2A agent, visitor-facing: delegate a task (summarise / draft / plan), watch its lifecycle, get an artifact back.</div>
        <f:if condition="{data.header}"><div style="margin-top:.35rem;"><b>{data.header}</b></div></f:if>
        <f:if condition="{data.show_events}"><div style="margin-top:.25rem; color:#777; font-size:.8em;">⚙ Lifecycle-frame panel visible to visitors.</div></f:if>
    </div>
</div>

</html>
