<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
      xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
      data-namespace-typo3-fluid="true">

<f:layout name="Module" />

<f:section name="Content">

<div class="a2a-console" style="max-width: 1100px;">
    <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
            <h1 class="mb-1">A2A Skill Inspector</h1>
            <p class="text-body-secondary mb-0">The skills this agent advertises in its Agent Card, and the lifecycle states a task moves through.</p>
        </div>
        <a href="{f:uri.action(action: 'console')}" class="btn btn-outline-secondary btn-sm">
            <core:icon identifier="actions-arrow-left" size="small" /> Back to console
        </a>
    </div>

    <div class="card a2a-catalog__sec mb-3">
        <div class="card-header"><h2 class="h5 mb-0">Task lifecycle</h2></div>
        <div class="card-body">
            <f:for each="{states}" as="st">
                <div class="a2a-catalog__row a2a-cat--{st.accent}">
                    <span class="a2a-catalog__state">{st.state}</span>
                    <span class="a2a-catalog__desc">{st.desc}</span>
                </div>
            </f:for>
        </div>
    </div>

    <div class="card a2a-catalog__sec">
        <div class="card-header d-flex justify-content-between align-items-center">
            <h2 class="h5 mb-0">Advertised skills</h2>
            <a href="{cardUrl}" target="_blank" rel="noreferrer" class="a2a-cardurl">{cardUrl}</a>
        </div>
        <div class="card-body">
            <f:for each="{skills}" as="skill">
                <div class="a2a-skill">
                    <div class="a2a-skill__head">
                        <span class="a2a-skill__name">{skill.name}</span>
                        <code class="a2a-skill__id">{skill.id}</code>
                        <f:for each="{skill.tags}" as="tag"><span class="a2a-skill__tag">{tag}</span></f:for>
                    </div>
                    <div class="a2a-skill__desc">{skill.description}</div>
                    <div class="a2a-skill__ex">
                        <f:for each="{skill.examples}" as="ex"><span class="a2a-skill__exitem">"{ex}"</span></f:for>
                    </div>
                    <f:if condition="{skill.inputPrompt}">
                        <div class="a2a-skill__input"><core:icon identifier="actions-comment" size="small" /> Asks: {skill.inputPrompt}</div>
                    </f:if>
                </div>
            </f:for>
        </div>
    </div>
</div>

</f:section>

</html>
